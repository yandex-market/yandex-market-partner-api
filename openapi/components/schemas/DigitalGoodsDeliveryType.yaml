description: >
  Способ получения цифрового товара:


  * `EMAIL` — код активации по почте: покупатель получит письмо с кодом и
  инструкцией на почту.


  * `ACTIVATION_CODE` — код активации в заказе на Маркете: покупатель получит
  инструкцию и код в чате с магазином, а в списке заказов сможет скопировать
  код.


  * `STEAM_GIFT` — игры подарком в Steam: вы получите от покупателя ссылку
  формата https://s.team/p/m**-***/******** на добавление в друзья. Перейдите по
  ссылке, добавьте покупателя в друзья и отправьте ему игру. В течение трех
  часов передайте Маркету статус, что заказ доставлен — через API или на
  странице заказа.


  * `CHAT` — игры и товары в чате с покупателем на Маркете: покупатель получит
  сертификат в чате с магазином. Передайте Маркету статус, что заказ доставлен —
  через API или на странице заказа.
type: string
enum:
  - EMAIL
  - ACTIVATION_CODE
  - STEAM_GIFT
  - CHAT
