description: |
  Способ денежного перевода:
  - `BUYER` — оплата или возврат деньгами.
  - `MARKET_CESSION` — уступка задолженности покупателя.

  Устаревшие способы:
  - `CASHBACK`.
  - `MARKETPLACE`.
  - `SPLIT`.
type: string
enum:
  - BUYER
  - CASHBACK
  - MARKETPLACE
  - MARKET_CESSION
  - SPLIT
