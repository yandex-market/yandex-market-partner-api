description: Доступное решение по возврату.
type: object
required:
  - decisionType
properties:
  decisionType:
    $ref: ./ReturnDecisionType.yaml
  decisionReasonTypes:
    description: Возможные причины отказа (только для решения DECLINE_REFUND).
    type: array
    nullable: true
    uniqueItems: true
    minItems: 1
    items:
      $ref: ./ReturnRequestDecisionReasonType.yaml
  partialCompensationBounds:
    description: >
      Пределы суммы частичной компенсации. Заполнено только при `decisionType` =
      `PARTIAL_MONEY_REFUND`;

      для остальных типов решений поле отсутствует.
    $ref: ./PartialCompensationBoundsDTO.yaml
