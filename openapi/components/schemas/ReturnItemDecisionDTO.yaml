description: Решения по товару в возврате.
type: object
required:
  - returnItemId
  - decisionType
properties:
  returnItemId:
    $ref: ./ReturnItemId.yaml
  decisionType:
    description: Решение по товару в возврате.
    $ref: ./ReturnRequestDecisionType.yaml
  decisionReasonType:
    description: Причина отказа.
    $ref: ./ReturnRequestDecisionReasonType.yaml
  comment:
    $ref: ./ReturnItemDecisionComment.yaml
  compensation:
    description: |
      Сумма добровольной компенсации по позиции возврата.
      Указывайте только при `decisionType` = `PARTIAL_MONEY_REFUND`.
    $ref: ./BasePriceDTO.yaml
