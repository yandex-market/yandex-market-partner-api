description: >
  Ставка НДС.

  Возможные значения:


  * `VAT_22` — НДС 22%.

  * `NO_VAT` — НДС не облагается.

  * `VAT_12` — НДС 12%.

  * `VAT_10` — НДС 10%.

  * `VAT_05` — НДС 5%.

  * `VAT_07` — НДС 7%.


  Если у партнёра в кабинете установлена ставка, не входящая в список, —
  значение не возвращается.
type: string
enum:
  - VAT_22
  - NO_VAT
  - VAT_12
  - VAT_10
  - VAT_05
  - VAT_07
