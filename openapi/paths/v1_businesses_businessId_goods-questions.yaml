  operationId: getGoodsQuestions
  summary: Получение вопросов о товарах продавца
  description: >
    {% include notitle [access](../../_auto/method_scopes/getGoodsQuestions.md)
    %}


    Возвращает вопросы о товарах продавца по указанным фильтрам.


    {% note tip "Вы также можете настроить API-уведомления" %}


    Маркет отправит вам
    [запрос](../../push-notifications/reference/sendNotification.md), когда
    появится новый вопрос. А полную информацию о нем можно получить с помощью
    этого метода.


    [{#T}](../../push-notifications/index.md)


    {% endnote %}


    Результаты возвращаются постранично, одна страница содержит не более 50
    вопросов.


    {% include notitle [limit](../../_auto/method_limits/getGoodsQuestions.md)
    %}
  parameters:
    - $ref: ../components/parameters/BusinessId.yaml
    - $ref: ../components/parameters/AliasedPageToken.yaml
    - $ref: ../components/parameters/PageLimit50.yaml
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: ../components/schemas/GetQuestionsRequest.yaml
  responses:
    '200':
      description: Список вопросов.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/GetQuestionsResponse.yaml
    '400':
