get:
  tags:
    - returns
    - fbs
    - dbs
    - express
    - fby
  x-auth-scopes:
    - all-methods
    - all-methods:read-only
    - inventory-and-order-processing
    - inventory-and-order-processing:read-only
  x-restrictions:
    - urbanads
  x-resource-limit-config:
    path: resp
    amount: 10000
    period: hours
    tariff-resource-limits:
      none:
        amount: 5000
        period: hours
        period-duration: 1
      medium:
        amount: 5000
        period: hours
        period-duration: 1
  operationId: getReturnPhoto
  summary: Получение фотографий товаров в возврате
  description: "{% include notitle [:no-translate[access]](../../_auto/method_scopes/getReturnPhoto.md) %}\n\nПолучает фотографии товаров, которые покупатель приложил к заявлению на возврат.\n\nХеш изображения (`imageHash`) можно получить из ответов методов [GET\_v2/campaigns/{campaignId}/orders/{orderId}/returns/{returnId}](../../reference/orders/getReturn.md) и [GET\_v2/campaigns/{campaignId}/returns](../../reference/orders/getReturns.md) — в поле `images` решения по товару.\n\nМаксимальный размер изображения — 50 МБ.\n\nТип изображения можно определить по заголовку `Content-Type` в ответе.\n\n{% include notitle [:no-translate[limit]](../../_auto/method_limits/getReturnPhoto.md) %}\n"
  parameters:
    - $ref: ../components/parameters/CampaignId.yaml
    - $ref: ../components/parameters/OrderId.yaml
    - $ref: ../components/parameters/ReturnId.yaml
    - $ref: ../components/parameters/ItemId.yaml
    - $ref: ../components/parameters/ImageHash.yaml
  responses:
    '200':
      description: Фотография товаров.
      content:
        image/jpeg:
          schema:
            type: string
            format: binary
        image/png:
          schema:
            type: string
            format: binary
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '404':
      $ref: ../components/responses/404.yaml
    '420':
      $ref: ../components/responses/420.yaml
    '500':
      $ref: ../components/responses/500.yaml
