post:
  tags:
    - reports
    - fby
    - fbs
    - dbs
    - express
  x-auth-scopes:
    - all-methods
    - finance-and-accounting
    - promotion
  x-resource-limit-config:
    path: resp
    amount: 100
    period: hours
    tariff-resource-limits:
      none:
        amount: 1
        period: minutes
        period-duration: 2
      medium:
        amount: 1
        period: minutes
        period-duration: 1
  x-restrictions:
    - market-yandex-go
  operationId: generateBannersStatisticsReport
  summary: Отчет по охватному продвижению
  description: "{% include notitle [:no-translate[access]](../../_auto/method_scopes/generateBannersStatisticsReport.md) %}\n\nЗапускает генерацию сводного отчета по охватному продвижению. {% if audience == partner %}Что это за отчет: [для баннеров](https://yandex.ru/support/marketplace/ru/marketing/advertising-tools/banner#statistics), [для пуш-уведомлений](https://yandex.ru/support/marketplace/ru/marketing/advertising-tools/push-notifications#statistics).{% endif %}\n\nУзнать статус генерации и получить ссылку на готовый отчет можно с помощью запроса [GET\_v2/reports/info/{reportId}](../../reference/reports/getReportInfo.md).\n\n{% include notitle [:no-translate[reports]](../../_auto/reports/incuts/banners_statistics.md) %}\n\n{% if audience != \"advertiser\" %}\n\n{% include notitle [:no-translate[tariff-period]](../../_includes/common/report-data-period-400-days.md) %}\n\n{% endif %}\n\n{% include notitle [:no-translate[limit]](../../_auto/method_limits/generateBannersStatisticsReport.md) %}\n"
  parameters:
    - $ref: ../components/parameters/ReportFormat.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/GenerateBannersStatisticsRequest.yaml
  responses:
    '200':
      description: >-
        В ответ приходит идентификатор, который позволяет узнавать статус
        генерации и скачать готовый отчет.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/GenerateReportResponse.yaml
    '400':
      $ref: ../components/responses/400.yaml
    '401':
      $ref: ../components/responses/401.yaml
    '403':
      $ref: ../components/responses/403.yaml
    '420':
      $ref: ../components/responses/420.yaml
    '500':
      $ref: ../components/responses/500.yaml
